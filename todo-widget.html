<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes tâches</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 32px rgba(0,0,0,.10);
  width: 100%;
  max-width: 460px;
  overflow: hidden;
}

.header {
  background: #1a1a2e;
  padding: 28px 28px 22px;
}
.header h1 {
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.3px;
}
.header .stats {
  margin-top: 6px;
  font-size: 13px;
  color: rgba(255,255,255,.45);
}

.input-row {
  display: flex;
  border-bottom: 1px solid #eee;
}
.input-row input {
  flex: 1;
  border: none;
  outline: none;
  padding: 16px 18px;
  font-size: 14px;
  color: #1a1a2e;
  background: #fafafa;
}
.input-row input::placeholder { color: #aaa; }
.input-row button {
  background: #4f46e5;
  color: #fff;
  border: none;
  padding: 0 22px;
  font-size: 22px;
  cursor: pointer;
  transition: background .2s;
}
.input-row button:hover { background: #4338ca; }

.list {
  max-height: 420px;
  overflow-y: auto;
  padding: 8px 0;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #aaa;
  padding: 10px 18px 4px;
}

.task {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid #f3f3f3;
  transition: background .15s;
  animation: slidein .2s ease;
}
@keyframes slidein {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.task:last-child { border-bottom: none; }
.task:hover { background: #fafafa; }

.check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid #d1d5db;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .2s, background .2s;
}
.check:hover { border-color: #4f46e5; }
.check.done {
  background: #22c55e;
  border-color: #22c55e;
}
.check.done::after {
  content: '';
  width: 5px;
  height: 9px;
  border-right: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(45deg) translate(-1px, -1px);
  display: block;
}

.task-text {
  flex: 1;
  font-size: 14px;
  color: #1a1a2e;
  line-height: 1.4;
}
.task-text.done {
  text-decoration: line-through;
  color: #aaa;
}

.del {
  background: none;
  border: none;
  color: #d1d5db;
  font-size: 18px;
  cursor: pointer;
  padding: 0 2px;
  transition: color .2s;
  flex-shrink: 0;
  line-height: 1;
}
.del:hover { color: #ef4444; }

.empty {
  text-align: center;
  padding: 48px 20px;
  color: #ccc;
}
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

.footer {
  border-top: 1px solid #eee;
  padding: 12px 18px;
  display: flex;
  justify-content: flex-end;
}
.clear-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  transition: color .2s;
}
.clear-btn:hover { color: #ef4444; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Mes tâches</h1>
    <div class="stats" id="stats">Aucune tâche</div>
  </div>

  <div class="input-row">
    <input id="inp" type="text" placeholder="Ajouter une tâche…" maxlength="120"
      onkeydown="if(event.key==='Enter') add()">
    <button onclick="add()" title="Ajouter">+</button>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <button class="clear-btn" onclick="clearDone()">Supprimer les terminées</button>
  </div>
</div>

<script>
var todos = JSON.parse(localStorage.getItem('todos_v1') || '[]');

function save() { localStorage.setItem('todos_v1', JSON.stringify(todos)); }

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var pending = todos.filter(function(t){ return !t.done; });
  var done    = todos.filter(function(t){ return t.done; });

  // Stats
  var s = document.getElementById('stats');
  if (todos.length === 0) {
    s.textContent = 'Aucune tâche';
  } else {
    s.textContent = pending.length + ' à faire · ' + done.length + ' terminée' + (done.length !== 1 ? 's' : '');
  }

  // List
  var list = document.getElementById('list');
  if (todos.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">✓</div><p>Aucune tâche pour l\'instant.<br>Ajoute-en une ci-dessus !</p></div>';
    return;
  }

  var html = '';
  if (pending.length > 0) {
    html += '<div class="section-label">À faire</div>';
    pending.forEach(function(t) { html += row(t); });
  }
  if (done.length > 0) {
    html += '<div class="section-label">Terminées</div>';
    done.forEach(function(t) { html += row(t); });
  }
  list.innerHTML = html;
}

function row(t) {
  return '<div class="task">' +
    '<div class="check' + (t.done ? ' done' : '') + '" onclick="toggle(\'' + t.id + '\')" title="' + (t.done ? 'Remettre à faire' : 'Marquer comme fait') + '"></div>' +
    '<span class="task-text' + (t.done ? ' done' : '') + '">' + esc(t.text) + '</span>' +
    '<button class="del" onclick="remove(\'' + t.id + '\')" title="Supprimer">×</button>' +
    '</div>';
}

function add() {
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text) return;
  todos.unshift({ id: uid(), text: text, done: false });
  save(); render();
  inp.value = '';
  inp.focus();
}

function toggle(id) {
  var t = todos.find(function(x){ return x.id === id; });
  if (t) { t.done = !t.done; save(); render(); }
}

function remove(id) {
  todos = todos.filter(function(x){ return x.id !== id; });
  save(); render();
}

function clearDone() {
  todos = todos.filter(function(x){ return !x.done; });
  save(); render();
}

render();
</script>
</body>
</html>
